name: Preview

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  CARGO_TERM_COLOR: always
  TRUNK_VERSION: "0.21.14"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-preview-deploy:
    runs-on: ubuntu-latest
    name: Build and Preview Deploy
    permissions:
      pull-requests: write
      contents: read
      deployments: write
    steps:
      - name: git-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install Trunk
        run: |
          curl -fsSL "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" | tar xzf - -C /usr/local/bin
      - name: Build
        working-directory: demo
        run: trunk build --release

      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$TOKEN"
      - name: Preview Deploy
        id: deploy
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        working-directory: demo/dist
        run: |
          URL=$(vercel deploy --token="$TOKEN" --prebuilt 2>&1 || vercel deploy --token="$TOKEN")
          echo "preview-url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $URL"
