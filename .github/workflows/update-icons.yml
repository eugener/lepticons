name: Update Icons

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday at 9am UTC
  workflow_dispatch: # manual trigger

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-icons:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: git-checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: develop

      - name: Update lucide submodule
        id: update
        run: |
          cd lucide
          OLD_SHA=$(git rev-parse HEAD)
          git fetch origin
          git checkout origin/main
          NEW_SHA=$(git rev-parse HEAD)
          echo "old_sha=$OLD_SHA" >> "$GITHUB_OUTPUT"
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet lucide; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No icon updates found"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Icon updates found"
          fi

      - name: Setup Rust
        if: steps.check.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        if: steps.check.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Generate icon code
        if: steps.check.outputs.changed == 'true'
        run: |
          cd codegen
          cargo run --bin lepticons-codegen
          cd ..

      - name: Verify generated code
        if: steps.check.outputs.changed == 'true'
        run: cargo clippy -p lepticons --all-targets -- -D warnings

      - name: Compute icon diff
        if: steps.check.outputs.changed == 'true'
        id: diff
        env:
          OLD_SHA: ${{ steps.update.outputs.old_sha }}
          NEW_SHA: ${{ steps.update.outputs.new_sha }}
        run: |
          cd lucide
          # Diff SVG files between old and new submodule SHAs
          DIFF=$(git diff --name-status "$OLD_SHA" "$NEW_SHA" -- 'icons/*.svg' || true)
          ADDED=$(echo "$DIFF" | grep -c '^A' || true)
          MODIFIED=$(echo "$DIFF" | grep -c '^M' || true)
          REMOVED=$(echo "$DIFF" | grep -c '^D' || true)
          TOTAL=$(grep -c '#\[cfg(feature' ../lepticons/src/lucide_icon_data.rs)

          # Validate all values are numeric to prevent injection
          for name in ADDED MODIFIED REMOVED TOTAL; do
            val="${!name}"
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then
              echo "Non-numeric $name: $val"
              exit 1
            fi
          done

          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "modified=$MODIFIED" >> "$GITHUB_OUTPUT"
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Added: $ADDED, Modified: $MODIFIED, Removed: $REMOVED, Total: $TOTAL"

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-lucide-icons
          commit-message: "Update Lucide icons (+${{ steps.diff.outputs.added }}, ~${{ steps.diff.outputs.modified }}, -${{ steps.diff.outputs.removed }})"
          title: "Update Lucide icons (+${{ steps.diff.outputs.added }}, ~${{ steps.diff.outputs.modified }}, -${{ steps.diff.outputs.removed }})"
          body: |
            Automated update of the Lucide icon submodule and regenerated icon data.

            **Changes:**
            - Added: ${{ steps.diff.outputs.added }}
            - Modified: ${{ steps.diff.outputs.modified }}
            - Removed: ${{ steps.diff.outputs.removed }}
            - Total icons: ${{ steps.diff.outputs.total }}
          base: develop
          draft: true
          labels: automated
          reviewers: eugener
          delete-branch: true
