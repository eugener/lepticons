name: Update Icons

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday at 9am UTC
  workflow_dispatch: # manual trigger

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-icons:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: git-checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: develop

      - name: Update lucide submodule
        id: update
        run: |
          cd lucide
          OLD_SHA=$(git rev-parse HEAD)
          git fetch origin
          git checkout origin/main
          NEW_SHA=$(git rev-parse HEAD)
          echo "old_sha=$OLD_SHA" >> "$GITHUB_OUTPUT"
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet lucide; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No icon updates found"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Icon updates found"
          fi

      - name: Setup Rust
        if: steps.check.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        if: steps.check.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Generate icon code
        if: steps.check.outputs.changed == 'true'
        run: |
          cd codegen
          cargo run --bin lepticons-codegen
          cd ..

      - name: Verify generated code
        if: steps.check.outputs.changed == 'true'
        run: cargo clippy -p lepticons --all-targets -- -D warnings

      - name: Compute icon diff
        if: steps.check.outputs.changed == 'true'
        id: diff
        env:
          OLD_SHA: ${{ steps.update.outputs.old_sha }}
          NEW_SHA: ${{ steps.update.outputs.new_sha }}
        run: |
          cd lucide
          DIFF=$(git diff --name-status "$OLD_SHA" "$NEW_SHA" -- 'icons/*.svg' || true)

          # Extract icon names (strip path and extension)
          icon_name() { basename "$1" .svg; }

          ADDED_LIST=$(echo "$DIFF" | grep '^A' | awk '{print $2}' || true)
          MODIFIED_LIST=$(echo "$DIFF" | grep '^M' | awk '{print $2}' || true)
          REMOVED_LIST=$(echo "$DIFF" | grep '^D' | awk '{print $2}' || true)

          ADDED_COUNT=$(echo "$ADDED_LIST" | grep -c . || true)
          MODIFIED_COUNT=$(echo "$MODIFIED_LIST" | grep -c . || true)
          REMOVED_COUNT=$(echo "$REMOVED_LIST" | grep -c . || true)
          # Count every variant's cfg line. Earlier pattern `#\[cfg(feature` missed
          # multi-category icons emitted as `#[cfg(any(feature = ..., feature = ...))]`.
          TOTAL=$(grep -c '#\[cfg(' ../lepticons/src/lucide_icon_data.rs)

          # Validate counts are numeric
          for name in ADDED_COUNT MODIFIED_COUNT REMOVED_COUNT TOTAL; do
            val="${!name}"
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then
              echo "Non-numeric $name: $val" && exit 1
            fi
          done

          # Build icon lists as markdown (sanitize to alphanumeric/hyphen only)
          format_list() {
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              name=$(icon_name "$line" | tr -cd 'a-zA-Z0-9-')
              echo "  - \`$name\`"
            done
          }

          ADDED_MD=$(echo "$ADDED_LIST" | format_list)
          MODIFIED_MD=$(echo "$MODIFIED_LIST" | format_list)
          REMOVED_MD=$(echo "$REMOVED_LIST" | format_list)

          # Write outputs
          echo "added=$ADDED_COUNT" >> "$GITHUB_OUTPUT"
          echo "modified=$MODIFIED_COUNT" >> "$GITHUB_OUTPUT"
          echo "removed=$REMOVED_COUNT" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Multi-line body via delimiter
          {
            echo "body<<DIFF_EOF"
            echo "Automated update of the Lucide icon submodule and regenerated icon data."
            echo ""
            echo "**Total icons: $TOTAL**"
            echo ""
            if [ "$ADDED_COUNT" -gt 0 ]; then
              echo "**Added ($ADDED_COUNT):**"
              echo "$ADDED_MD"
              echo ""
            fi
            if [ "$MODIFIED_COUNT" -gt 0 ]; then
              echo "**Modified ($MODIFIED_COUNT):**"
              echo "$MODIFIED_MD"
              echo ""
            fi
            if [ "$REMOVED_COUNT" -gt 0 ]; then
              echo "**Removed ($REMOVED_COUNT):**"
              echo "$REMOVED_MD"
              echo ""
            fi
            echo "DIFF_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Added: $ADDED_COUNT, Modified: $MODIFIED_COUNT, Removed: $REMOVED_COUNT, Total: $TOTAL"

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-lucide-icons
          commit-message: "Update Lucide icons (+${{ steps.diff.outputs.added }}, ~${{ steps.diff.outputs.modified }}, -${{ steps.diff.outputs.removed }})"
          title: "Update Lucide icons (+${{ steps.diff.outputs.added }}, ~${{ steps.diff.outputs.modified }}, -${{ steps.diff.outputs.removed }})"
          body: ${{ steps.diff.outputs.body }}
          base: develop
          draft: true
          labels: automated
          reviewers: eugener
          delete-branch: true
